services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minilp
      POSTGRES_PASSWORD: minilp
      POSTGRES_DB: minilp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minilp"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      MINILP_DATABASE_URL: postgresql+psycopg://minilp:minilp@db:5432/minilp
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:

# Note: if `docker compose up` hangs on `npm install` / `pip install` behind a VPN,
# that's an MTU mismatch — set `"mtu": 1280` in Docker Desktop's Docker Engine
# config (daemon.json) rather than overriding the network MTU here, so build-time
# and runtime agree and Compose doesn't churn the network.
