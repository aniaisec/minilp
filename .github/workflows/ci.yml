name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: minilp
          POSTGRES_PASSWORD: minilp
          POSTGRES_DB: minilp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minilp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://minilp:minilp@localhost:5432/minilp_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Migrate (schema builds cleanly)
        run: alembic upgrade head
        env:
          MINILP_DATABASE_URL: postgresql+psycopg://minilp:minilp@localhost:5432/minilp_test
      - name: Test (pytest)
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Typecheck + build
        run: npm run build
      - name: Test (vitest)
        run: npm run test
